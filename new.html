<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>新增課文 · 精讀</title>
<link rel="stylesheet" href="assets/style.css">
<style>
  .gen-field{margin-bottom:16px}
  .gen-field label{display:block;font-family:var(--font-head);font-weight:600;margin-bottom:6px;font-size:.95rem}
  .gen-field input[type=text], .gen-field input[type=password], .gen-field textarea{
    width:100%;border:2px solid var(--line);border-radius:12px;padding:11px 13px;font-family:var(--font-en);
    font-size:1rem;background:#fff;color:var(--ink);outline:none}
  .gen-field input:focus, .gen-field textarea:focus{border-color:var(--mango)}
  .gen-field textarea{min-height:180px;resize:vertical;line-height:1.6}
  .lang-toggle{display:flex;gap:8px}
  .lang-toggle button{flex:1;font-family:var(--font-head);font-weight:600;border:2px solid var(--line);background:#fff;
    color:var(--muted);border-radius:12px;padding:12px;cursor:pointer;font-size:1rem}
  .lang-toggle button.on{background:var(--teal);color:#fff;border-color:var(--teal)}
  .key-hint{font-size:.8rem;color:var(--muted);margin-top:5px;line-height:1.5}
  .genfb{margin-top:14px;min-height:1.4em}
  details.adv{margin-top:8px}
  details.adv summary{font-size:.85rem;color:var(--muted);cursor:pointer}
  .photo-name{font-size:.85rem;color:var(--teal-deep);margin-top:6px}
</style>
</head>
<body>
<header class="site"><div class="row">
  <a href="index.html">← 目錄</a>
  <h1>➕ 新增課文</h1>
</div></header>
<main>
  <p class="hint" style="margin-top:4px">拍照或粘貼一段課文，AI 自動做成精讀頁（聽全文／逐句講解／生詞／語法／連詞成句／跟讀／聽力題／背句／造句）。內容由你提供，你自己拍的、你有版權的才用。</p>

  <div class="card">
    <div class="gen-field">
      <label>① 這是哪種語言的課文？</label>
      <div class="lang-toggle">
        <button id="langEn" class="on" onclick="setLang('en')">📘 英語</button>
        <button id="langJp" onclick="setLang('jp')">🎌 日語</button>
      </div>
    </div>

    <div class="gen-field">
      <label>② 智譜 API Key（只存這台設備，用來調 AI 生成）</label>
      <input type="password" id="apiKey" placeholder="貼上你的智譜 key（設過一次就會記住）">
      <div class="key-hint">還沒有？去 <b>bigmodel.cn</b> 註冊 → 控制台領 API Key，並確認帳戶已<b>充值</b>（文字用 glm-4-plus 是付費模型，一課約幾分錢；拍照識字用免費視覺模型）。key 通用。</div>
      <details class="adv">
        <summary>進階：自訂模型名稱</summary>
        <div style="margin-top:8px">
          <input type="text" id="modelText" placeholder="文字模型（預設 glm-4-plus，出題更好）" style="margin-bottom:6px">
          <input type="text" id="modelVision" placeholder="視覺模型（預設 glm-4v-flash）">
          <div class="key-hint" style="margin-top:6px">想省錢可填 <b>glm-4-flash</b>（免費，但聽力題多走「聽句選意」保底）。</div>
        </div>
      </details>
    </div>

    <div class="gen-field">
      <label>③ 課文內容（下面任選一種：打字／語音／上傳圖片／Word·txt 檔）</label>
      <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px">
        <label class="big-btn ghost" style="cursor:pointer;padding:10px 16px;font-size:.9rem;margin:0">
          🖼️ 上傳圖片<input type="file" id="photo" accept="image/*" style="display:none">
        </label>
        <label class="big-btn ghost" style="cursor:pointer;padding:10px 16px;font-size:.9rem;margin:0">
          📄 Word / txt 檔<input type="file" id="docfile" accept=".txt,.docx,text/plain" style="display:none">
        </label>
        <button type="button" class="big-btn ghost" id="voiceBtn" style="padding:10px 16px;font-size:.9rem;margin:0" onclick="toggleVoice()">🎤 語音輸入</button>
      </div>
      <div class="photo-name" id="photoName"></div>
      <textarea id="pasteText" placeholder="打字或粘貼課文；也可按上面的按鈕語音輸入 / 上傳圖片 / 選 Word 檔…"></textarea>
      <div class="key-hint">💡 圖片走「看圖識字」，文字/Word 走文字理解。手機鍵盤上的麥克風也能直接口述。</div>
    </div>

    <div style="text-align:center">
      <button id="genBtn" class="big-btn teal" onclick="doGenerate()" style="min-width:180px">✨ 生成精讀</button>
    </div>
    <div class="genfb" id="genFb"></div>
  </div>
</main>
<footer class="site">jingdu · 拍照即成課</footer>

<script src="assets/core.js"></script>
<script src="assets/sync.js"></script>
<script src="assets/generate.js"></script>
<script src="assets/fileread.js"></script>
<script>
const $=s=>document.querySelector(s);
let lang='en';
function setLang(l){ lang=l; $('#langEn').classList.toggle('on',l==='en'); $('#langJp').classList.toggle('on',l==='jp'); }

// 回填已存的 key/模型
$('#apiKey').value = JDGen.getKey();
if(localStorage.getItem('jingdu_zhipu_model_text')) $('#modelText').value = JDGen.getTextModel();
if(localStorage.getItem('jingdu_zhipu_model_vision')) $('#modelVision').value = JDGen.getVisionModel();

let photoDataUrl = null;
function fb(msg, bad){ $('#genFb').innerHTML='<div class="acc-badge '+(bad?'bad':'good')+'">'+JD.esc(msg)+'</div>'; }

/* 圖片上傳（相簿或拍照）→ 走看圖識字 */
$('#photo').addEventListener('change', async e=>{
  const f = e.target.files[0]; if(!f) return;
  $('#photoName').textContent = '讀取圖片…';
  try{
    const r = await JDFile.read(f);
    photoDataUrl = r.dataUrl;
    $('#photoName').textContent = '已選圖片：'+f.name+' ✓（生成時走看圖識字）';
  }catch(err){ $('#photoName').textContent = '圖片讀取失敗：'+(err.message||err); }
});

/* Word / txt 檔 → 抽出文字填進輸入框 */
$('#docfile').addEventListener('change', async e=>{
  const f = e.target.files[0]; if(!f) return;
  $('#photoName').textContent = '讀取檔案…';
  try{
    const r = await JDFile.read(f);
    if(r.kind==='text'){ $('#pasteText').value = r.text; photoDataUrl=null; $('#photoName').textContent = '已讀取「'+f.name+'」的文字 ✓（可在下面修改）'; }
    else { photoDataUrl = r.dataUrl; $('#photoName').textContent = '已選圖片：'+f.name+' ✓'; }
  }catch(err){ $('#photoName').textContent = '讀取失敗：'+(err.message||err); }
});

/* 語音輸入 → 識別後追加到輸入框（語言跟隨所選課程） */
let voiceRec=null;
function toggleVoice(){
  const btn=$('#voiceBtn');
  if(voiceRec){ try{ voiceRec.stop(); }catch(e){} return; }
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if(!SR){ $('#photoName').textContent='這台設備不支援語音輸入，請用鍵盤上的麥克風口述，或打字'; return; }
  const r=new SR(); voiceRec=r;
  r.lang = lang==='jp' ? 'ja-JP' : 'en-US';
  r.interimResults=false; r.continuous=true; r.maxAlternatives=1;
  btn.textContent='🔴 聽寫中（再按停止）'; btn.classList.add('rec');
  r.onresult=e=>{ let s=''; for(let i=e.resultIndex;i<e.results.length;i++){ if(e.results[i].isFinal) s+=e.results[i][0].transcript; }
    if(s){ const t=$('#pasteText'); t.value=(t.value?t.value+' ':'')+s.trim(); } };
  r.onerror=e=>{ $('#photoName').textContent = e.error==='not-allowed'?'麥克風權限被拒絕：設定→Safari→麥克風':'語音輸入出錯（'+e.error+'），可改用鍵盤麥克風'; };
  r.onend=()=>{ voiceRec=null; btn.textContent='🎤 語音輸入'; btn.classList.remove('rec'); };
  try{ r.start(); }catch(e){ voiceRec=null; btn.textContent='🎤 語音輸入'; btn.classList.remove('rec'); }
}

async function doGenerate(){
  const key = $('#apiKey').value.trim();
  if(!key){ fb('請先填智譜 API Key', true); return; }
  JDGen.setKey(key);
  JDGen.setModels($('#modelText').value.trim(), $('#modelVision').value.trim());

  const text = $('#pasteText').value.trim();
  if(!photoDataUrl && !text){ fb('請先輸入課文：打字／語音／上傳圖片／選 Word·txt 檔', true); return; }

  const btn=$('#genBtn'); btn.disabled=true; const old=btn.textContent; btn.textContent='⏳ 生成中…';
  try{
    const onP = m=>fb(m);
    const data = photoDataUrl ? await JDGen.fromImage(lang, photoDataUrl, onP)
                              : await JDGen.fromText(lang, text, onP);
    fb('生成成功，正在保存…');
    const id = JDGen.saveLesson(lang, data);
    const viewer = lang==='jp' ? 'jp/lessons/view.html' : 'lessons/view.html';
    location.href = viewer + '?id=' + encodeURIComponent(id);
  }catch(e){
    fb('生成失敗：'+(e.message||e), true);
    btn.disabled=false; btn.textContent=old;
  }
}
</script>
</body>
</html>
