<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>復盤中心 · 精讀</title>
<link rel="stylesheet" href="assets/style.css">
<link rel="icon" type="image/svg+xml" href="assets/logo.svg">
<link rel="apple-touch-icon" href="assets/apple-touch-icon.png">
</head>
<body>
<header class="site"><div class="row">
  <a href="index.html">← 目錄</a>
  <h1>📅 復盤中心</h1>
</div></header>
<main>
  <p class="hint" style="margin-top:4px">背錯的句子在這裡按「記憶最佳時間」排隊：30分鐘 → 1天 → 2天 → 4天 → 7天 → 15天 → 30天 → 90天。每個節點背到 85 分以上就晉一級，連過 8 級＝牢固 🏅</p>
  <p class="hint" style="margin-top:2px">🔒 想設「必須複習完才能上新課」的<b>家長鎖</b>？在 <a href="report.html" style="color:var(--teal-deep);font-weight:600">學習報告</a> 頁最底的「家長設定」。</p>

  <div id="quizZone" style="display:none">
    <div class="stage">
      <div class="ring" id="qRing" style="display:none"></div>
      <div class="target" id="qTarget"></div>
      <div id="qBtns" style="margin-top:12px"></div>
      <div id="qResult" style="margin-top:14px"></div>
      <div class="heard" id="qHeard"></div>
    </div>
  </div>

  <h2 class="sec">⏰ 現在到期（<span id="dueCnt">0</span>）</h2>
  <div id="dueList"></div>

  <h2 class="sec" style="margin-top:26px">🗂️ 全部錯題</h2>
  <div id="allList"></div>
</main>
<footer class="site">按時復盤的句子，最不容易忘 🧠</footer>

<script src="assets/core.js"></script>
<script src="assets/tts.js"></script>
<script src="assets/sync.js"></script>
<script src="assets/generate.js"></script>
<script>
const $ = s=>document.querySelector(s);
let cur=null, timer=null, recBusy=false;

/* 判斷錯題屬哪種語言（決定造新例句時的提示詞） */
function langOf(it){
  if(it.kmap) return 'jp';                       /* 日語錯題背句時帶漢字讀音對照 */
  if(/^jp-/.test(it.lessonId||'')) return 'jp';
  try{ const u=JDGen.allUserLessons()[it.lessonId]; if(u&&u.lang) return u.lang; }catch(e){}
  return 'en';
}
/* 復盤答對後：給單詞一個「新語境」例句，強化遷移；快取不重複花錢，無 key 不顯示 */
function transferPrompt(it){
  if(it.type!=='word') return '';
  if(!window.JDGen || !JDGen.getKey()) return '';
  return '<button class="big-btn ghost" id="exBtn" style="margin-top:8px" onclick="showExample()">💡 換個句子，再見這個詞一面</button>'+
         '<div id="exBox" style="margin-top:8px"></div>';
}
window.showExample = async function(){
  if(!cur || cur.type!=='word') return;
  const box=$('#exBox'), btn=$('#exBtn'); if(!box) return;
  const lang=langOf(cur);
  const word=(cur.en||'').replace(/\[[^\]]+\]/g,'');   /* 日語去振假名再送 */
  const cacheKey='jingdu_ex_'+lang+':'+word;
  let cached=null; try{ cached=JSON.parse(localStorage.getItem(cacheKey)||'null'); }catch(e){}
  if(cached){ renderExample(box, cached, lang); return; }
  if(btn) btn.disabled=true;
  box.innerHTML='<div class="acc-badge">⏳ AI 正在想一個新句子…</div>';
  try{
    const ex=await JDGen.exampleFor(lang, word, cur.zh||'');
    localStorage.setItem(cacheKey, JSON.stringify(ex));
    localStorage.setItem('jingdu_updatedAt', String(Date.now()));
    if(window.JDSYNC) window.JDSYNC.schedule();
    renderExample(box, ex, lang);
  }catch(e){
    box.innerHTML='<div class="acc-badge bad">沒生成成功（'+JD.esc(e.message||String(e))+'）</div>';
    if(btn) btn.disabled=false;
  }
};
function renderExample(box, ex, lang){
  box.innerHTML='<div class="card" style="text-align:left;margin:0">'+
    '<b>💡 '+JD.esc(ex.eg)+'</b>'+
    ' <button class="btn-voice" onclick="'+(lang==='jp'?'JD.speak('+JSON.stringify(ex.eg)+',false,\'ja-JP\')':'JD.speak('+JSON.stringify(ex.eg)+',false)')+'">🔊</button>'+
    '<p style="color:var(--muted);margin-top:4px;font-size:.9rem">'+JD.esc(ex.zh)+'</p></div>';
}

function levelBar(lv){
  let h='<span class="lv">';
  for(let i=0;i<6;i++) h+='<i class="'+(i<lv?'on':'')+'"></i>';
  return h+'</span>';
}
function render(){
  const due = JD.dueItems(), all = JD.allItems();
  $('#dueCnt').textContent = due.length;
  const dl = $('#dueList'); dl.innerHTML='';
  if(!due.length) dl.innerHTML='<p class="empty">現在沒有到期的句子 🌿</p>';
  due.forEach(it=>{
    const d=document.createElement('div');
    d.className='card srs-item';
    /* 單詞類到期項不預先顯示英文答案 */
    const head = it.type==='word'
      ? '<b>🀄 '+JD.esc(it.zh)+'</b> <span style="color:var(--muted);font-size:.85rem">單詞 '+JD.esc(it.pos||'')+'</span>'
      : '<b>'+JD.esc(it.en)+'</b><br><span style="color:var(--muted);font-size:.85rem">'+JD.esc(it.zh)+'</span>';
    d.innerHTML='<div style="display:flex;align-items:center;gap:12px">'+
      '<div style="flex:1">'+head+levelBar(it.level)+'</div>'+
      '<button class="big-btn mango" style="padding:10px 20px">背它</button></div>';
    d.querySelector('button').onclick=()=>startQuiz(it);
    dl.appendChild(d);
  });
  const al = $('#allList'); al.innerHTML='';
  if(!all.length) al.innerHTML='<p class="empty">錯題本是空的——太厲害了吧！</p>';
  all.forEach(it=>{
    const d=document.createElement('div');
    d.className='card srs-item';
    /* 單詞類同樣不洩英文答案（考察=看中文說英文，牢固後才顯示英文） */
    const label = (it.type==='word' && !it.solid)
      ? '🀄 '+JD.esc(it.zh)+' <span style="color:var(--muted);font-size:.85rem">單詞 '+JD.esc(it.pos||'')+'</span>'
      : JD.esc(it.en);
    d.innerHTML='<div style="display:flex;align-items:center;gap:12px">'+
      '<div style="flex:1"><b>'+label+'</b>'+levelBar(it.level)+'</div>'+
      '<span style="font-family:var(--font-head);font-size:.82rem;color:'+(it.solid?'var(--green)':'var(--muted)')+'">'+
      (it.solid?'🏅 牢固':'下次：'+JD.fmtDue(it.due))+'</span></div>';
    al.appendChild(d);
  });
}

function startQuiz(it){
  cur=it; clearInterval(timer);
  $('#quizZone').style.display='block';
  window.scrollTo({top:0,behavior:'smooth'});
  if(it.type==='word'){
    /* 單詞復盤：看中文 → 直接開口說英文單詞（不給看答案） */
    $('#qRing').style.display='none';
    $('#qTarget').innerHTML='<div class="mask-box">🀄 「'+JD.esc(it.zh)+'」'+(it.pos?'（'+JD.esc(it.pos)+'）':'')+
      '<br>這個單詞的英文怎麼說？按麥克風說出來！</div>';
    $('#qResult').innerHTML=''; $('#qHeard').textContent='';
    $('#qBtns').innerHTML='<button id="qRecBtn" class="big-btn rec" onclick="qRec()">🎙️ 開口說</button>'+
      '<button class="big-btn ghost" onclick="qFail(true)">😳 忘了，看答案</button>';
    return;
  }
  $('#qTarget').innerHTML = JD.esc(it.en);
  JD.speak(it.en,false);
  $('#qResult').innerHTML=''; $('#qHeard').textContent='';
  const ring=$('#qRing'); ring.style.display='flex';
  $('#qBtns').innerHTML='';
  let left=10; const C=2*Math.PI*30;
  ring.innerHTML='<svg width="66" height="66"><circle class="bg" cx="33" cy="33" r="30"/>'+
    '<circle class="fg" cx="33" cy="33" r="30" stroke-dasharray="'+C+'" stroke-dashoffset="0"/></svg><span id="qSec">10</span>';
  const fg=ring.querySelector('.fg');
  timer=setInterval(()=>{
    left--; $('#qSec').textContent=left;
    fg.style.strokeDashoffset=C*(10-left)/10;
    if(left<=0){ clearInterval(timer); mask(); }
  },1000);
}
function mask(){
  $('#qRing').style.display='none';
  $('#qTarget').innerHTML='<div class="mask-box">🙈 蓋住了！按麥克風背出來</div>';
  $('#qBtns').innerHTML='<button id="qRecBtn" class="big-btn rec" onclick="qRec()">🎙️ 開始背</button>'+
    '<button class="big-btn ghost" onclick="qFail(true)">😳 忘了，看答案</button>';
}
window.qRec = function(){
  const btn=$('#qRecBtn');
  if(recBusy) return; /* 聆聽中鎖住，防連按 aborted */
  if(!JD.recSupported()){
    $('#qResult').innerHTML='<p style="margin-bottom:8px">此設備不支援語音識別，改用自評：</p>'+
      '<button class="big-btn teal" onclick="qPass()">✅ 背對了</button>'+
      '<button class="big-btn ghost" onclick="qFail()">❌ 沒背對</button>';
    $('#qTarget').innerHTML = JD.esc(cur.en);
    return;
  }
  recBusy=true;
  btn.disabled=true; btn.classList.add('listening'); btn.textContent='👂 正在聽…';
  const rec = JD.listen((text,err)=>{
    recBusy=false;
    btn.disabled=false; btn.classList.remove('listening'); btn.textContent='🎙️ 再試一次';
    if(err && !text){
      const msg = err==='not-allowed'?'麥克風權限被拒絕：設定→Safari→麥克風':(err==='silence'?'沒聽到聲音，再大聲點':(err==='timeout'?'等了好久沒聽清，再按一次試試':(err==='aborted'?'剛剛還在聽呢～說完停頓一下會自動結束，不用重複按':'識別出錯（'+err+'），再試一次')));
      $('#qResult').innerHTML='<div class="acc-badge bad">'+msg+'</div>'; return;
    }
    const r=JD.compare(cur.en,text);
    $('#qTarget').innerHTML = JD.esc(cur.en);
    $('#qResult').innerHTML='<div class="result-words">'+r.tokens.map(t=>'<span class="rw '+t.st+'">'+JD.esc(t.w)+'</span>').join('')+'</div>'+
      '<div class="acc-badge '+(r.accuracy>=JD.PASS?'good':'bad')+'">'+(r.accuracy>=JD.PASS?'🎉':'💪')+' 準確率 '+r.accuracy+'%</div>';
    $('#qHeard').textContent='你說的是：'+text;
    if(r.accuracy>=JD.PASS) qPass(); else qFail();
  });
  /* 說完主動點「我說完了」立即打分，不必等軟件盲目檢測靜音 */
  $('#qResult').innerHTML='<div class="acc-badge">👂 開始背吧！背完就點「我說完了」馬上打分</div>'+
    '<div style="margin-top:8px"><button class="big-btn teal recdone">✅ 我說完了</button></div>';
  const _db=$('#qResult').querySelector('.recdone');
  if(_db) _db.onclick=()=>{ _db.disabled=true; _db.textContent='⏳ 打分中…'; try{ rec && rec.stop(); }catch(e){} };
};
window.qPass = function(){
  const it=cur; /* render() 不改 cur，但保險起見先抓住 */
  JD.reviewPass(it.id);
  $('#qBtns').innerHTML='<div class="acc-badge good">⬆️ 晉級成功！下次復盤：'+JD.fmtDue(JD.getBook()[it.id].due)+'</div>'+
    transferPrompt(it)+
    '<div><button class="big-btn teal" onclick="closeQuiz()">繼續 →</button></div>';
  render();
};
window.qFail = function(showAns){
  JD.reviewFail(cur.id);
  if(showAns) $('#qTarget').innerHTML = JD.esc(cur.en);
  $('#qBtns').innerHTML='<div class="acc-badge bad">回到第一級，30 分鐘後再戰 💪</div>'+
    '<div><button class="big-btn teal" onclick="closeQuiz()">繼續 →</button></div>';
  render();
};
window.closeQuiz = function(){ $('#quizZone').style.display='none'; cur=null; };

render();
</script>
</body>
</html>
