<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>日語精讀 · 我的課文本</title>
<link rel="stylesheet" href="../assets/style.css">
</head>
<body>
<header class="site"><div class="row">
  <h1>🎌 日語精讀 · 我的課文本</h1>
  <a href="../index.html">📘 切換英語版</a>
</div></header>
<main>
  <a class="due-banner" id="dueBanner" href="review.html"></a>
  <div class="card" id="syncCard" style="display:none"></div>

  <a class="due-banner" href="../new.html" style="background:var(--teal);color:#fff"><span class="n">➕</span><span>拍照 / 粘貼一段日語課文，AI 自動做成精讀頁</span></a>

  <h2 class="sec">課文列表</h2>
  <div id="lessonList"></div>
  <div id="userLessonList"></div>
</main>
<footer class="site">日語加油！頑張って！ 🌱</footer>

<script src="../assets/core.js"></script>
<script src="../assets/sync.js"></script>
<script src="../assets/generate.js"></script>
<script>
/* 課文註冊表：新增課文時由 build_lessons_jp.py 自動維護 */
const LESSONS = [
  {id:'jp-01', badge:'日語', num:'第1課', title:'初めまして（大家的日語 第1課）', href:'lessons/jp-01.html', secs:8}
];

const due = JD.dueItems().length;
const banner = document.getElementById('dueBanner');
if(due>0){
  banner.innerHTML = '<span class="n">📅</span><span>今日待復盤 <b style="font-size:1.3rem">'+due+'</b> 句 —— 點我開始！</span>';
}else{
  banner.classList.add('zero');
  banner.innerHTML = '<span class="n">🌿</span><span>今天沒有到期的復盤任務，去學新課吧！</span>';
}

const SECS_KEYS = ['listen','read','vocab','grammar','build','speak','quiz','recite'];
const box = document.getElementById('lessonList');
LESSONS.forEach(l=>{
  const p = JD.getProgress(l.id);
  const doneCnt = SECS_KEYS.filter(k=>p[k]).length;
  const pct = Math.round(doneCnt/l.secs*100);
  const a = document.createElement('a');
  a.className='card lesson-item';
  a.href=l.href;
  a.innerHTML = '<span class="badge">'+l.num+'<small>'+l.badge+'</small></span>'+
    '<span class="t"><span class="en">'+l.title+'</span></span>'+
    '<span class="pct">'+(pct>=100?'✅ 完成':pct+'%')+'</span>';
  box.appendChild(a);
});

/* 自建日語課文（lang==='jp'） */
function renderUserLessons(){
  const ubox = document.getElementById('userLessonList'); ubox.innerHTML='';
  const all = Object.values(JDGen.allUserLessons()).filter(l=>l.lang==='jp').sort((a,b)=>(b._meta?b._meta.created:0)-(a._meta?a._meta.created:0));
  if(!all.length) return;
  const h=document.createElement('h2'); h.className='sec'; h.textContent='我自己加的課'; ubox.appendChild(h);
  all.forEach(l=>{
    const p = JD.getProgress(l.id);
    const pct = Math.round(SECS_KEYS.filter(k=>p[k]).length/8*100);
    const a=document.createElement('a'); a.className='card lesson-item'; a.href='lessons/view.html?id='+encodeURIComponent(l.id);
    a.innerHTML='<span class="badge" style="background:var(--mango);color:var(--ink)">自建<small>日</small></span>'+
      '<span class="t"><span class="en">'+JD.esc(l.title||'未命名')+'</span></span>'+
      '<span class="pct">'+(pct>=100?'✅':pct+'%')+'</span>';
    ubox.appendChild(a);
  });
}
renderUserLessons();
window.JDSYNC_ONRESTORE = renderUserLessons;
</script>
</body>
</html>
