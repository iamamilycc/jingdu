<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>精讀 · 我的課文本</title>
<link rel="stylesheet" href="assets/style.css">
</head>
<body>
<header class="site"><div class="row">
  <h1>📘 英語精讀 · 我的課文本</h1>
  <a href="review.html">📅 復盤</a>
  <a href="voice.html">🔊 聲音</a>
  <a href="help.html">📖 說明</a>
  <a href="jp/index.html">🎌 切換日語版</a>
</div></header>
<main>
  <a class="streak-chip" id="streakChip" href="report.html"></a>
  <a class="due-banner" id="dueBanner" href="review.html"></a>
  <div class="card" id="syncCard" style="display:none"></div>

  <a class="due-banner" href="new.html" style="background:var(--teal);color:#fff"><span class="n">➕</span><span>拍照 / 粘貼一段課文，AI 自動做成精讀頁</span></a>

  <div id="searchBox" style="display:none;margin:14px 0 6px">
    <input type="text" id="lessonSearch" placeholder="🔍 搜尋課文（課名／中文意思）" autocomplete="off"
      style="width:100%;box-sizing:border-box;border:2px solid var(--line);border-radius:12px;padding:11px 14px;font-size:1rem;background:#fff;color:var(--ink);outline:none">
  </div>

  <h2 class="sec">課文列表</h2>
  <div id="lessonList"></div>
  <div id="userLessonList"></div>
  <p class="hint" id="searchEmpty" style="display:none">沒有符合的課文，換個關鍵字試試？</p>
</main>
<footer class="site">每天一點點，越背越輕鬆 🌱</footer>

<script src="assets/core.js"></script>
<script src="assets/sync.js"></script>
<script src="assets/generate.js"></script>
<script>
/* 課文註冊表：新增課文時 Claude 在此追加一行 */
const LESSONS = [
  {id:'nce2-01', badge:'NCE2', num:'L1', en:'A Private Conversation', zh:'私人談話', href:'lessons/nce2-01.html', secs:9},
  {id:'nce2-02', badge:'NCE2', num:'L2', en:'Breakfast or Lunch?', zh:'早餐還是午餐？', href:'lessons/nce2-02.html', secs:9}
];

const SECS_KEYS = ['listen','read','vocab','grammar','build','speak','quiz','recite','make'];
const SEC_NAME = {listen:'聽全文',read:'逐句精讀',vocab:'生詞卡',grammar:'語法點',build:'連詞成句',speak:'跟讀',quiz:'聽力題',recite:'背句',make:'造句'};

/* 今日學習流：到期復盤 → 第一個沒學完的課(直達環節) → 全完成才推新課。孩子零選擇。 */
function firstUndone(id){ const p=JD.getProgress(id); return SECS_KEYS.find(k=>!p[k]); }
function renderToday(){
  const banner = document.getElementById('dueBanner');
  banner.classList.remove('zero');
  const due = JD.dueItems().length;
  if(due>0){
    banner.href='review.html';
    banner.innerHTML='<span class="n">📅</span><span>今天的學習：先復盤 <b style="font-size:1.3rem">'+due+'</b> 句 —— 點我開始！</span>';
    return;
  }
  for(const l of LESSONS){
    const k=firstUndone(l.id);
    if(k){ banner.href=l.href+'?tab='+k;
      banner.innerHTML='<span class="n">▶️</span><span>今天的學習：繼續「'+JD.esc(l.en)+'」· '+SEC_NAME[k]+'</span>'; return; }
  }
  const ul=Object.values(JDGen.allUserLessons()).filter(x=>x.lang==='en').sort((a,b)=>(a._meta?a._meta.created:0)-(b._meta?b._meta.created:0));
  for(const l of ul){
    const k=firstUndone(l.id);
    if(k){ banner.href='lessons/view.html?id='+encodeURIComponent(l.id)+'&tab='+k;
      banner.innerHTML='<span class="n">▶️</span><span>今天的學習：繼續「'+JD.esc(l.title||'未命名')+'」· '+SEC_NAME[k]+'</span>'; return; }
  }
  banner.classList.add('zero'); banner.href='new.html';
  banner.innerHTML='<span class="n">🌿</span><span>全部學完啦！拍照 / 粘貼課文，加一課新的吧</span>';
}
const box = document.getElementById('lessonList');
LESSONS.forEach(l=>{
  const p = JD.getProgress(l.id);
  const doneCnt = SECS_KEYS.filter(k=>p[k]).length;
  const pct = Math.round(doneCnt/l.secs*100);
  const a = document.createElement('a');
  a.className='card lesson-item';
  a.href=l.href;
  a.innerHTML = '<span class="badge">'+l.num+'<small>'+l.badge+'</small></span>'+
    '<span class="t"><span class="en">'+l.en+'</span><br><span class="zh">'+l.zh+'</span></span>'+
    '<span class="pct">'+(pct>=100?'✅ 完成':pct+'%')+'</span>';
  box.appendChild(a);
});

/* 自建課文（本機/雲同步生成的英語課，lang==='en'） */
function renderUserLessons(){
  const ubox = document.getElementById('userLessonList'); ubox.innerHTML='';
  const all = Object.values(JDGen.allUserLessons()).filter(l=>l.lang==='en').sort((a,b)=>(b._meta?b._meta.created:0)-(a._meta?a._meta.created:0));
  if(!all.length) return;
  const h=document.createElement('h2'); h.className='sec'; h.textContent='我自己加的課'; ubox.appendChild(h);
  all.forEach(l=>{
    const p = JD.getProgress(l.id);
    const pct = Math.round(SECS_KEYS.filter(k=>p[k]).length/SECS_KEYS.length*100);
    const a=document.createElement('a'); a.className='card lesson-item'; a.href='lessons/view.html?id='+encodeURIComponent(l.id);
    a.innerHTML='<span class="badge" style="background:var(--mango);color:var(--ink)">自建<small>ENG</small></span>'+
      '<span class="t"><span class="en">'+JD.esc(l.title||'未命名')+'</span>'+
      (l.level?'<br><span class="zh">'+'★'.repeat(l.level)+'☆'.repeat(5-l.level)+' 難度</span>':'')+'</span>'+
      '<span class="pct">'+(pct>=100?'✅':pct+'%')+'</span>';
    const del=document.createElement('button');
    del.className='udel'; del.type='button'; del.textContent='🗑'; del.title='刪除這課';
    del.addEventListener('click', e=>{
      e.preventDefault(); e.stopPropagation();
      if(!confirm('確定刪除「'+(l.title||'未命名')+'」嗎？\n這課的進度和錯題復盤會一併清除，刪除後無法復原。')) return;
      JDGen.deleteLesson(l.id);
      renderUserLessons();
      refreshSearchVisibility();
    });
    a.appendChild(del);
    ubox.appendChild(a);
  });
}
function renderStreak(){
  const el=document.getElementById('streakChip'); if(!el) return;
  const st=JD.streak();
  el.innerHTML = st.todayDone ? '🔥 連續學習 <b>'+st.n+'</b> 天 · 看週報 →'
    : (st.n>0 ? '🌱 已連續 '+st.n+' 天，今天學一點就續上！ · 看週報 →' : '🌱 今天還沒開始學 · 看週報 →');
}
/* 課文搜尋：課多了才顯示搜尋框，即時過濾內建課+自建課（比對課名英文/中文/難度徽章文字） */
function refreshSearchVisibility(){
  const n = document.querySelectorAll('#lessonList .lesson-item, #userLessonList .lesson-item').length;
  document.getElementById('searchBox').style.display = n > 4 ? 'block' : 'none';
}
function applySearch(){
  const q = (document.getElementById('lessonSearch').value||'').trim().toLowerCase();
  const items = document.querySelectorAll('#lessonList .lesson-item, #userLessonList .lesson-item');
  let shown = 0;
  items.forEach(el=>{
    const hit = !q || el.textContent.toLowerCase().includes(q);
    el.style.display = hit ? '' : 'none';
    if(hit) shown++;
  });
  document.getElementById('searchEmpty').style.display = (q && shown===0) ? 'block' : 'none';
}
document.getElementById('lessonSearch').addEventListener('input', applySearch);

renderUserLessons();
renderToday();
renderStreak();
refreshSearchVisibility();
window.JDSYNC_ONRESTORE = function(){ renderUserLessons(); renderToday(); renderStreak(); refreshSearchVisibility(); }; /* 雲端同步回來後刷新 */
</script>
</body>
</html>
